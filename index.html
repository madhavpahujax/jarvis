<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>J.A.R.V.I.S. — Multi-Agent AI</title>
  <meta name="description" content="JARVIS Multi-Agent AI Assistant" />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JARVIS" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #020617; color: #e2e8f0; font-family: 'IBM Plex Mono', monospace; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    input::placeholder, textarea::placeholder { color: #475569; }

    @keyframes pulse { 0%,100% { opacity:0.4; transform:translate(-50%,-50%) scale(1); } 50% { opacity:0.9; transform:translate(-50%,-50%) scale(1.3); } }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes typing { 0% { opacity:0.3; } 50% { opacity:1; } 100% { opacity:0.3; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinR { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

    /* ── LAYOUT ── */
    #app { display: flex; height: 100vh; width: 100vw; }
    #sidebar {
      width: 300px; min-width: 300px; background: #0a0f1e;
      border-right: 1px solid #1e293b; display: flex; flex-direction: column;
      transition: all 0.3s ease; overflow: hidden;
    }
    #sidebar.closed { width: 0; min-width: 0; }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── SIDEBAR ── */
    .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid #1e293b; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; }
    .sidebar-logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .sidebar-logo-text { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.2em; color: #00d4ff; }
    .sidebar-logo-sub { font-size: 9px; color: #475569; letter-spacing: 0.15em; }
    .agent-list { flex: 1; overflow: auto; padding: 12px; }
    .agent-list-title { color: #475569; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.2em; padding: 8px 6px 10px; }

    /* ── AGENT CARD ── */
    .agent-card {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 12px 16px; background: transparent;
      border: 1px solid rgba(255,255,255,0.04); border-radius: 12px;
      cursor: pointer; text-align: left; margin-bottom: 6px;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .agent-card:hover { border-color: rgba(255,255,255,0.1); }
    .agent-card.active { border-color: rgba(255,255,255,0.15); }
    .agent-card .active-bar {
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 0 2px 2px 0; display: none;
    }
    .agent-card.active .active-bar { display: block; }
    .agent-card .agent-icon { font-size: 24px; filter: grayscale(0.5); transition: filter 0.3s; }
    .agent-card.active .agent-icon { filter: none; }
    .agent-card .agent-name {
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
      letter-spacing: 0.05em; color: #94a3b8; transition: color 0.3s;
    }
    .agent-card.active .agent-name { color: inherit; }
    .agent-card .agent-desc {
      color: #64748b; font-size: 11px; font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .agent-card .delete-btn {
      position: absolute; top: 6px; right: 6px; width: 20px; height: 20px;
      background: rgba(239,68,68,0.13); border: 1px solid rgba(239,68,68,0.27);
      border-radius: 6px; color: #ef4444; cursor: pointer; font-size: 12px;
      display: none; align-items: center; justify-content: center;
    }
    .agent-card.active .delete-btn.show { display: flex; }

    .create-btn {
      width: 100%; padding: 12px; background: rgba(0,212,255,0.03);
      border: 1px dashed rgba(0,212,255,0.2); border-radius: 12px;
      color: #00d4ff; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.1em;
    }
    .create-btn:hover { background: rgba(0,212,255,0.07); }

    /* ── HEADER ── */
    #header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px; border-bottom: 1px solid #1e293b;
      background: rgba(10,15,30,0.53); backdrop-filter: blur(10px);
    }
    .menu-btn {
      background: none; border: 1px solid #1e293b; border-radius: 8px;
      color: #64748b; cursor: pointer; padding: 6px 10px; font-size: 16px;
    }
    .header-agent-icon { font-size: 24px; }
    .header-agent-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 0.08em; }
    .header-agent-desc { font-size: 11px; color: #475569; }
    .tab-btn {
      padding: 6px 14px; border-radius: 8px; font-size: 11px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 0.1em;
      cursor: pointer; border: 1px solid #1e293b; background: transparent; color: #64748b;
      transition: all 0.2s;
    }
    .tab-btn.active { background: rgba(0,212,255,0.08); }

    /* ── CHAT ── */
    #chat-area { flex: 1; overflow: auto; padding: 24px 24px 12px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; opacity: 0.7; }
    .empty-title { margin-top: 24px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 0.15em; text-align: center; }
    .empty-desc { margin-top: 8px; color: #475569; font-size: 12px; text-align: center; max-width: 320px; }
    .empty-hint { margin-top: 20px; color: #334155; font-size: 11px; letter-spacing: 0.1em; }

    .msg { display: flex; margin-bottom: 16px; animation: fadeSlideIn 0.3s ease; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }
    .msg-bubble {
      max-width: 78%; padding: 12px 18px; font-family: 'IBM Plex Mono', monospace;
      font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 18px 18px 4px 18px; color: #e2e8f0;
    }
    .msg.assistant .msg-bubble {
      border-radius: 18px 18px 18px 4px; color: #cbd5e1;
    }
    .speak-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-left: 10px; padding: 3px 8px; border-radius: 8px;
      cursor: pointer; font-size: 11px;
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
    }
    .typing-dots { display: flex; gap: 6px; padding: 12px 18px; margin-bottom: 16px; }
    .typing-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      animation: typing 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ── INPUT ── */
    #input-area { padding: 12px 24px 20px; }
    .input-box {
      display: flex; gap: 10px; align-items: flex-end;
      background: #0f172a; border-radius: 16px; padding: 8px 8px 8px 18px;
    }
    .input-box textarea {
      flex: 1; background: transparent; border: none; outline: none;
      color: #e2e8f0; font-family: 'IBM Plex Mono', monospace; font-size: 13px;
      resize: none; line-height: 1.6; max-height: 120px;
    }
    .send-btn {
      padding: 10px 20px; border-radius: 12px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px;
      letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s ease; border: 1px solid;
    }

    /* ── KNOWLEDGE ── */
    .knowledge-panel { padding: 20px; }
    .knowledge-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.1em; margin-bottom: 16px; }
    .knowledge-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .k-input {
      flex: 1; padding: 10px 14px; background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; color: #e2e8f0; font-family: 'IBM Plex Mono', monospace; font-size: 13px;
      outline: none;
    }
    .k-input:focus { border-color: rgba(0,212,255,0.33); }
    .k-add-btn {
      padding: 10px 18px; border-radius: 10px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; white-space: nowrap;
    }
    .k-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px;
      background: #0f172a; border: 1px solid #1e293b; border-radius: 10px; margin-bottom: 8px;
    }
    .k-item-idx { font-size: 10px; font-family: 'IBM Plex Mono', monospace; margin-top: 3px; }
    .k-item-text { flex: 1; color: #94a3b8; font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.6; }
    .k-item-del { background: none; border: none; color: rgba(239,68,68,0.53); cursor: pointer; font-size: 14px; }
    .k-empty { color: #475569; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease;
    }
    .modal {
      width: 90%; max-width: 480px; background: #0f172a;
      border: 1px solid #1e293b; border-radius: 20px; padding: 32px;
      box-shadow: 0 0 60px rgba(0,212,255,0.07); max-height: 90vh; overflow: auto;
    }
    .modal h2 { color: #00d4ff; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 0.1em; margin-bottom: 24px; text-align: center; }
    .modal label {
      display: block; color: #64748b; font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 11px; letter-spacing: 0.15em; margin-bottom: 6px;
    }
    .modal input, .modal textarea {
      width: 100%; padding: 10px 14px; background: #1e293b;
      border: 1px solid #334155; border-radius: 10px; color: #e2e8f0;
      font-family: 'IBM Plex Mono', monospace; font-size: 13px; margin-bottom: 18px;
      outline: none; box-sizing: border-box;
    }
    .modal input:focus, .modal textarea:focus { border-color: rgba(0,212,255,0.33); }
    .modal textarea { height: 90px; resize: vertical; }
    .icon-grid, .color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 10px; font-size: 20px;
      background: transparent; border: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn.active { background: #1e293b; border-color: rgba(0,212,255,0.33); }
    .color-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid #333; cursor: pointer;
    }
    .color-btn.active { border: 3px solid white; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .modal-actions button {
      flex: 1; padding: 12px; border-radius: 12px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
    }
    .cancel-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; }
    .deploy-btn { border: 1px solid; }

    /* ── ORB ── */
    .orb-container { position: relative; width: 180px; height: 180px; margin: 0 auto; }
    .orb-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 180px; height: 180px; }
    .orb-center {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 80px; height: 80px; border-radius: 50%; transition: box-shadow 0.6s ease;
    }
    .orb-core {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 30px; height: 30px; border-radius: 50%;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      #sidebar { position: fixed; z-index: 100; height: 100vh; }
      #sidebar.closed { width: 0; min-width: 0; }
      .msg-bubble { max-width: 90% !important; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🤖</div>
        <div>
          <div class="sidebar-logo-text">J.A.R.V.I.S.</div>
          <div class="sidebar-logo-sub">MULTI-AGENT AI SYSTEM</div>
        </div>
      </div>
    </div>
    <div class="agent-list">
      <div class="agent-list-title">ACTIVE AGENTS (<span id="agent-count">5</span>)</div>
      <div id="agent-cards"></div>
    </div>
    <div style="padding:12px; border-top:1px solid #1e293b;">
      <button class="create-btn" onclick="openCreateModal()">+ CREATE NEW AGENT</button>
      <button class="create-btn" style="margin-top:6px; border-color:rgba(255,255,255,0.1); color:#64748b;" onclick="showApiKeyModal()">🔑 CHANGE API KEY</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="header-agent-icon" id="h-icon"></span>
      <div style="flex:1; min-width:0;">
        <div class="header-agent-name" id="h-name"></div>
        <div class="header-agent-desc" id="h-desc"></div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="tab-btn active" id="tab-chat" onclick="switchView('chat')">CHAT</button>
        <button class="tab-btn" id="tab-knowledge" onclick="switchView('knowledge')">KNOWLEDGE</button>
      </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view" style="flex:1; display:flex; flex-direction:column; min-height:0;">
      <div id="chat-area"></div>
      <div id="input-area">
        <div class="input-box" id="input-box">
          <textarea id="msg-input" rows="1" placeholder="Speak to J.A.R.V.I.S...."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">SEND</button>
        </div>
      </div>
    </div>

    <!-- Knowledge View -->
    <div id="knowledge-view" style="flex:1; overflow:auto; display:none;">
      <div class="knowledge-panel">
        <h3 class="knowledge-title" id="k-title">KNOWLEDGE BASE</h3>
        <div class="knowledge-input-row">
          <input class="k-input" id="k-input" placeholder="Store information here..."
            onkeydown="if(event.key==='Enter'&&this.value.trim()){addKnowledge(this.value.trim());this.value='';}" />
          <button class="k-add-btn" id="k-add-btn" onclick="let v=document.getElementById('k-input');if(v.value.trim()){addKnowledge(v.value.trim());v.value='';}">+ ADD</button>
        </div>
        <div id="k-items"></div>
      </div>
    </div>
  </div>
</div>

<!-- Create Agent Modal -->
<div class="modal-overlay" id="create-modal" style="display:none;" onclick="closeCreateModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>CREATE NEW AGENT</h2>
    <label>AGENT NAME</label>
    <input id="ca-name" placeholder="e.g. Music Guru" />
    <label>ICON</label>
    <div class="icon-grid" id="ca-icons"></div>
    <label>COLOUR</label>
    <div class="color-grid" id="ca-colors"></div>
    <label>DESCRIPTION</label>
    <input id="ca-desc" placeholder="What does this agent do?" />
    <label>SYSTEM INSTRUCTIONS</label>
    <textarea id="ca-prompt" placeholder="Tell this agent how to behave, what to focus on, and how to respond..."></textarea>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeCreateModal()">CANCEL</button>
      <button class="deploy-btn" id="ca-deploy" onclick="deployAgent()">DEPLOY AGENT</button>
    </div>
  </div>
</div>

<!-- API Key Modal -->
<div class="modal-overlay" id="api-modal" style="display:none;">
  <div class="modal">
    <h2>🔑 CONNECT TO AI</h2>
    <p style="color:#94a3b8; font-size:12px; font-family:'IBM Plex Mono',monospace; margin-bottom:20px; line-height:1.7; text-align:center;">
      JARVIS needs a free Google Gemini API key to think.<br>
      Get one free (no credit card needed) at<br><a href="https://aistudio.google.com/apikey" target="_blank" style="color:#00d4ff;">aistudio.google.com/apikey</a>
    </p>
    <label>YOUR GEMINI API KEY</label>
    <input id="api-key-input" placeholder="AIza..." style="font-size:12px;" />
    <p style="color:#475569; font-size:10px; font-family:'IBM Plex Mono',monospace; margin-top:-10px; margin-bottom:18px;">
      Your key is stored only on your device. Never shared.
    </p>
    <div class="modal-actions">
      <button class="deploy-btn" style="background:rgba(0,212,255,0.13); border-color:rgba(0,212,255,0.33); color:#00d4ff;" onclick="saveApiKey()">ACTIVATE JARVIS</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// J.A.R.V.I.S. MULTI-AGENT AI ENGINE
// ══════════════════════════════════════════

const DEFAULT_AGENTS = [
  { id:"jarvis-core", name:"J.A.R.V.I.S.", icon:"🧠", color:"#00d4ff",
    description:"Core intelligence — analyse, summarise, and retrieve your stored information.",
    systemPrompt:"You are J.A.R.V.I.S., a hyper-intelligent AI assistant. You analyse, summarise, and retrieve information the user has stored. Be concise, precise, and proactive. Speak like a refined British AI butler. Always address the user as 'Sir' or by name if known.",
    locked:true },
  { id:"football-analyst", name:"Pitch Intel", icon:"⚽", color:"#00ff88",
    description:"Football analysis — tactics, player stats, match breakdowns.",
    systemPrompt:"You are Pitch Intel, a football analysis agent inside the J.A.R.V.I.S. system. You provide tactical analysis, player performance breakdowns, formation analysis, and match predictions. You know football deeply — Premier League, La Liga, Champions League, World Cup, and more. Be passionate but data-driven." },
  { id:"football-news", name:"Transfer Wire", icon:"📰", color:"#ff6b35",
    description:"Football news — transfers, rumours, match results, breaking stories.",
    systemPrompt:"You are Transfer Wire, a football news agent inside the J.A.R.V.I.S. system. You report on transfers, match results, injuries, managerial changes, and breaking football news. Be direct, exciting, and journalist-like. Cover all major leagues and tournaments." },
  { id:"study-assistant", name:"Scholar", icon:"📚", color:"#a855f7",
    description:"Study classes — notes, revision, explanations, exam prep.",
    systemPrompt:"You are Scholar, a study assistant agent inside the J.A.R.V.I.S. system. You help with class notes, revision summaries, concept explanations, exam preparation, homework help, and learning strategies. Break down complex topics simply. Use examples and analogies. Be encouraging and patient." },
  { id:"school-manager", name:"Campus", icon:"🏫", color:"#f59e0b",
    description:"School organiser — timetable, assignments, deadlines, school life.",
    systemPrompt:"You are Campus, a school management agent inside the J.A.R.V.I.S. system. You help organise school life — timetables, assignment tracking, deadline reminders, event planning, and school-related tasks. Be organised, clear, and proactive about upcoming deadlines." },
];

const ICONS = ["🤖","🎯","🔬","🎮","🏋️","🎵","💡","🌍","📊","🛡️","🚀","🎨","💰","🧪","📱"];
const COLORS = ["#00d4ff","#00ff88","#ff6b35","#a855f7","#f59e0b","#ef4444","#ec4899","#14b8a6"];

// ── STATE ──
let agents = JSON.parse(localStorage.getItem('jarvis_agents')) || [...DEFAULT_AGENTS];
let activeAgent = agents[0].id;
let conversations = JSON.parse(localStorage.getItem('jarvis_convos')) || {};
let knowledge = JSON.parse(localStorage.getItem('jarvis_knowledge')) || [];
let apiKey = localStorage.getItem('jarvis_api_key') || '';
let currentView = 'chat';
let loading = false;
let sidebarOpen = true;
let showApiModal = !apiKey;

// Modal state
let caIcon = "🤖";
let caColor = "#00d4ff";

// ── SAVE ──
function save() {
  localStorage.setItem('jarvis_agents', JSON.stringify(agents));
  localStorage.setItem('jarvis_convos', JSON.stringify(conversations));
  localStorage.setItem('jarvis_knowledge', JSON.stringify(knowledge));
}

// ── AGENT HELPERS ──
function getAgent() { return agents.find(a => a.id === activeAgent) || agents[0]; }
function getMessages() { return conversations[activeAgent] || []; }

// ── RENDER ──
function render() {
  const agent = getAgent();
  const msgs = getMessages();

  // Agent count
  document.getElementById('agent-count').textContent = agents.length;

  // Agent cards
  const cardsEl = document.getElementById('agent-cards');
  cardsEl.innerHTML = agents.map(a => `
    <div class="agent-card ${a.id === activeAgent ? 'active' : ''}"
         style="${a.id === activeAgent ? `background:${a.color}0f; border-color:${a.color}44;` : ''}"
         onclick="setActiveAgent('${a.id}')">
      <div class="active-bar" style="background:${a.color};"></div>
      <span class="agent-icon">${a.icon}</span>
      <div style="flex:1; min-width:0;">
        <div class="agent-name" style="${a.id === activeAgent ? `color:${a.color}` : ''}">${a.name.toUpperCase()}</div>
        <div class="agent-desc">${a.description}</div>
      </div>
      ${!a.locked ? `<button class="delete-btn ${a.id === activeAgent ? 'show' : ''}" onclick="event.stopPropagation();deleteAgent('${a.id}')">×</button>` : ''}
    </div>
  `).join('');

  // Header
  document.getElementById('h-icon').textContent = agent.icon;
  document.getElementById('h-name').textContent = agent.name.toUpperCase();
  document.getElementById('h-name').style.color = agent.color;
  document.getElementById('h-desc').textContent = agent.description;

  // Tabs
  document.getElementById('tab-chat').className = `tab-btn ${currentView === 'chat' ? 'active' : ''}`;
  document.getElementById('tab-chat').style.background = currentView === 'chat' ? `${agent.color}14` : '';
  document.getElementById('tab-chat').style.borderColor = currentView === 'chat' ? `${agent.color}44` : '#1e293b';
  document.getElementById('tab-chat').style.color = currentView === 'chat' ? agent.color : '#64748b';
  document.getElementById('tab-knowledge').className = `tab-btn ${currentView === 'knowledge' ? 'active' : ''}`;
  document.getElementById('tab-knowledge').style.background = currentView === 'knowledge' ? `${agent.color}14` : '';
  document.getElementById('tab-knowledge').style.borderColor = currentView === 'knowledge' ? `${agent.color}44` : '#1e293b';
  document.getElementById('tab-knowledge').style.color = currentView === 'knowledge' ? agent.color : '#64748b';

  // Views
  document.getElementById('chat-view').style.display = currentView === 'chat' ? 'flex' : 'none';
  document.getElementById('knowledge-view').style.display = currentView === 'knowledge' ? 'block' : 'none';

  // Input box
  document.getElementById('input-box').style.border = `1px solid ${agent.color}22`;
  document.getElementById('msg-input').placeholder = `Speak to ${agent.name}...`;
  const sendBtn = document.getElementById('send-btn');
  const hasInput = document.getElementById('msg-input').value.trim();
  sendBtn.style.background = hasInput ? `${agent.color}22` : '#1e293b';
  sendBtn.style.borderColor = hasInput ? `${agent.color}55` : '#334155';
  sendBtn.style.color = hasInput ? agent.color : '#475569';

  // Chat
  const chatArea = document.getElementById('chat-area');
  if (msgs.length === 0) {
    chatArea.innerHTML = `
      <div class="empty-state">
        <div class="orb-container">
          <svg class="orb-ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="90" fill="none" stroke="${agent.color}" stroke-width="1.5" stroke-dasharray="2 6" opacity="0.4" style="animation:spin 12s linear infinite; transform-origin:center;" />
            <circle cx="100" cy="100" r="78" fill="none" stroke="${agent.color}" stroke-width="0.8" stroke-dasharray="4 12" opacity="0.3" style="animation:spinR 18s linear infinite; transform-origin:center;" />
            <circle cx="100" cy="100" r="65" fill="none" stroke="${agent.color}" stroke-width="0.5" stroke-dasharray="1 8" opacity="0.2" style="animation:spin 25s linear infinite; transform-origin:center;" />
          </svg>
          <div class="orb-center" style="background:radial-gradient(circle at 35% 35%, ${agent.color}44, ${agent.color}11 60%, transparent); box-shadow:0 0 20px ${agent.color}22;">
            <div class="orb-core" style="background:radial-gradient(circle, ${agent.color}, transparent); opacity:0.4;"></div>
          </div>
        </div>
        <div class="empty-title" style="color:${agent.color};">${agent.name.toUpperCase()} ONLINE</div>
        <div class="empty-desc">${agent.description}</div>
        <div class="empty-hint">TYPE A MESSAGE TO BEGIN</div>
      </div>`;
  } else {
    chatArea.innerHTML = msgs.map((m, i) => `
      <div class="msg ${m.role}">
        <div class="msg-bubble" style="${m.role === 'assistant' ? `background:${agent.color}0a; border:1px solid ${agent.color}25;` : ''}">
          ${escapeHtml(m.content)}
          ${m.role === 'assistant' ? `<button class="speak-btn" style="background:${agent.color}15; border:1px solid ${agent.color}30; color:${agent.color};" onclick="speak(\`${escapeJs(m.content)}\`)">🔊 SPEAK</button>` : ''}
        </div>
      </div>
    `).join('');

    if (loading) {
      chatArea.innerHTML += `<div class="typing-dots"><span style="background:${agent.color}"></span><span style="background:${agent.color}"></span><span style="background:${agent.color}"></span></div>`;
    }
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // Knowledge
  document.getElementById('k-title').style.color = agent.color;
  document.getElementById('k-add-btn').style.background = `${agent.color}22`;
  document.getElementById('k-add-btn').style.border = `1px solid ${agent.color}44`;
  document.getElementById('k-add-btn').style.color = agent.color;

  const kItems = document.getElementById('k-items');
  if (knowledge.length === 0) {
    kItems.innerHTML = '<p class="k-empty">No information stored yet. Add notes, facts, or data above.</p>';
  } else {
    kItems.innerHTML = knowledge.map((item, i) => `
      <div class="k-item">
        <span class="k-item-idx" style="color:${agent.color}">#${i+1}</span>
        <span class="k-item-text">${escapeHtml(item)}</span>
        <button class="k-item-del" onclick="deleteKnowledge(${i})">×</button>
      </div>
    `).join('');
  }
}

function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeJs(str) { return str.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

// ── ACTIONS ──
function setActiveAgent(id) {
  activeAgent = id;
  currentView = 'chat';
  if (window.innerWidth <= 768) sidebarOpen = false;
  updateSidebar();
  render();
}

function switchView(v) { currentView = v; render(); }
function toggleSidebar() { sidebarOpen = !sidebarOpen; updateSidebar(); }
function updateSidebar() {
  document.getElementById('sidebar').className = sidebarOpen ? '' : 'closed';
}

function deleteAgent(id) {
  const a = agents.find(x => x.id === id);
  if (a?.locked) return;
  if (!confirm(`Delete agent "${a.name}"?`)) return;
  agents = agents.filter(x => x.id !== id);
  delete conversations[id];
  if (activeAgent === id) activeAgent = agents[0].id;
  save(); render();
}

function addKnowledge(text) { knowledge.push(text); save(); render(); }
function deleteKnowledge(i) { knowledge.splice(i, 1); save(); render(); }

// ── SPEAK ──
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB'; u.rate = 1; u.pitch = 0.9;
  const voices = speechSynthesis.getVoices();
  const brit = voices.find(v => v.lang === 'en-GB' && v.name.includes('Male')) || voices.find(v => v.lang === 'en-GB') || voices[0];
  if (brit) u.voice = brit;
  speechSynthesis.speak(u);
}
// Pre-load voices
speechSynthesis.getVoices();
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

// ── SEND MESSAGE ──
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || loading) return;

  const agent = getAgent();
  if (!conversations[activeAgent]) conversations[activeAgent] = [];
  conversations[activeAgent].push({ role: 'user', content: text });
  input.value = '';
  loading = true;
  save(); render();

  const knowledgeCtx = knowledge.length > 0
    ? `\n\nThe user has stored the following information in their knowledge base. Use it when relevant:\n${knowledge.map((k,i) => `[${i+1}] ${k}`).join('\n')}`
    : '';

  try {
    if (!apiKey) { showApiKeyModal(); loading = false; render(); return; }

    // Build Gemini conversation history
    const history = conversations[activeAgent].slice(-20);
    const geminiContents = [];

    // Add system instruction as first user message context
    const systemMsg = agent.systemPrompt + knowledgeCtx;

    for (const m of history) {
      geminiContents.push({
        role: m.role === 'user' ? 'user' : 'model',
        parts: [{ text: m.content }]
      });
    }

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemMsg }] },
        contents: geminiContents,
        generationConfig: { maxOutputTokens: 1000, temperature: 0.8 }
      }),
    });
    const data = await res.json();

    let reply = '';
    if (data.candidates && data.candidates[0]?.content?.parts) {
      reply = data.candidates[0].content.parts.map(p => p.text || '').join('');
    } else if (data.error) {
      reply = `Error: ${data.error.message || 'Something went wrong. Please check your API key.'}`;
    } else {
      reply = "I'm experiencing a connection issue, Sir. Please try again.";
    }

    conversations[activeAgent].push({ role: 'assistant', content: reply });
  } catch (e) {
    conversations[activeAgent].push({ role: 'assistant', content: "Connection disrupted. My systems seem to be offline momentarily. Please check your internet connection." });
  }

  loading = false;
  save(); render();
}

// Update send button style on input
document.getElementById('msg-input').addEventListener('input', () => {
  const agent = getAgent();
  const sendBtn = document.getElementById('send-btn');
  const hasInput = document.getElementById('msg-input').value.trim();
  sendBtn.style.background = hasInput ? `${agent.color}22` : '#1e293b';
  sendBtn.style.borderColor = hasInput ? `${agent.color}55` : '#334155';
  sendBtn.style.color = hasInput ? agent.color : '#475569';
});

// ── CREATE AGENT MODAL ──
function openCreateModal() {
  caIcon = '🤖'; caColor = '#00d4ff';
  document.getElementById('ca-name').value = '';
  document.getElementById('ca-desc').value = '';
  document.getElementById('ca-prompt').value = '';
  renderModalOptions();
  document.getElementById('create-modal').style.display = 'flex';
}
function closeCreateModal() { document.getElementById('create-modal').style.display = 'none'; }

function renderModalOptions() {
  document.getElementById('ca-icons').innerHTML = ICONS.map(ic => `
    <button class="icon-btn ${ic === caIcon ? 'active' : ''}" onclick="caIcon='${ic}'; renderModalOptions();">${ic}</button>
  `).join('');
  document.getElementById('ca-colors').innerHTML = COLORS.map(c => `
    <button class="color-btn ${c === caColor ? 'active' : ''}" style="background:${c};" onclick="caColor='${c}'; renderModalOptions(); updateDeployBtn();"></button>
  `).join('');
  updateDeployBtn();
}

function updateDeployBtn() {
  const btn = document.getElementById('ca-deploy');
  btn.style.background = `${caColor}22`;
  btn.style.borderColor = `${caColor}55`;
  btn.style.color = caColor;
}

function deployAgent() {
  const name = document.getElementById('ca-name').value.trim();
  if (!name) { alert('Please enter an agent name.'); return; }
  const desc = document.getElementById('ca-desc').value.trim() || 'Custom agent';
  const prompt = document.getElementById('ca-prompt').value.trim() || `You are ${name}, a custom AI agent inside the J.A.R.V.I.S. system. Be helpful and precise.`;

  const newAgent = {
    id: 'custom-' + Date.now(),
    name, icon: caIcon, color: caColor, description: desc,
    systemPrompt: prompt, locked: false,
  };
  agents.push(newAgent);
  activeAgent = newAgent.id;
  currentView = 'chat';
  closeCreateModal();
  save(); render();
}

// ── API KEY ──
function showApiKeyModal() {
  showApiModal = true;
  document.getElementById('api-modal').style.display = 'flex';
}
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { alert('Please enter your API key.'); return; }
  apiKey = key;
  localStorage.setItem('jarvis_api_key', apiKey);
  showApiModal = false;
  document.getElementById('api-modal').style.display = 'none';
  render();
}

// ── INIT ──
render();
if (showApiModal) showApiKeyModal();

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
